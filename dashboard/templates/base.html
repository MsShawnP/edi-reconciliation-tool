<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EDI Reconciliation{% endblock %} — Lailara LLC</title>
  <link rel="stylesheet" href="/static/css/lailara.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous"></script>
</head>
<body>

      <ul class="site-nav__links">
        <li><a href="/" class="{{ 'active' if active_page == 'dashboard' else '' }}">Exceptions</a></li>

    <footer class="site-footer">
      Built by <a href="https://lailarallc.com" target="_blank">Lailara LLC</a> —
      data hygiene and analytics consulting for specialty food brands scaling into national retail.
