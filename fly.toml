# fly.toml — Fly.io deployment configuration
# https://fly.io/docs/reference/configuration/
#
# Deploy:
#   fly launch   (first time — creates app and sets secrets)
#   fly deploy   (subsequent deploys)
#
# Set DATABASE_URL as a Fly secret, not an env var:
#   fly secrets set DATABASE_URL="postgresql://..."

app = "edi-reconciliation-tool"
primary_region = "iad"

[build]
  # Uses the project Dockerfile (see below for a minimal one)

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "5s"
    interval      = "30s"
    method        = "GET"
    path          = "/"
    timeout       = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
